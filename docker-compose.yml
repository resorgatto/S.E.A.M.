# ==========================================
# PayloadOps — Docker Compose
# ==========================================

services:
  # ---------- Web Application ----------
  web:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
    restart: unless-stopped

  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payloadops} -d ${POSTGRES_DB:-payloadops}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Celery Worker ----------
  celery-worker:
    build:
      context: .
      target: production
    command: celery -A config.celery worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Celery Beat (Scheduler) ----------
  celery-beat:
    build:
      context: .
      target: production
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_data:
